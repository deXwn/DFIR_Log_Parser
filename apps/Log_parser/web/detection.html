<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DFIR Detections</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-grid.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=4" />
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <h1>DFIR Detections</h1>
        <div class="topbar-links">
          <a class="btn secondary" href="http://localhost:8899/">Back to Toolkit</a>
          <a class="btn secondary" href="/">Search</a>
          <div class="pill">Run rules on demand</div>
        </div>
      </div>

      <div class="detection-page">
        <div class="detections-panel">
          <h2>Detection Runner</h2>
          <label>
            Root path
            <input
              type="text"
              id="rootPath"
              placeholder="/path/to/logs"
              autocomplete="off"
              required
            />
          </label>
          <label>
            Rules JSON
            <textarea
              id="detectionRules"
              rows="10"
              placeholder='[{"id":"failed_burst","name":"Failed Burst","severity":"high","regex":"failed","conditions":[{"field":"status","op":"eq","value":"401"}],"threshold":5,"time_window_seconds":300,"group_by":"src_ip"}]'
            ></textarea>
          </label>
          <div class="custom-rule-form">
            <label>
              Custom Rule Name
              <input
                type="text"
                id="customRuleName"
                placeholder="e.g. Internal Recon Burst"
                autocomplete="off"
              />
            </label>
            <div class="action-buttons">
              <button type="button" id="saveCustomRuleButton" class="secondary">
                Save Custom Rule
              </button>
              <button type="button" id="clearRuleSelectionButton" class="secondary">
                Clear Selection
              </button>
            </div>
          </div>
          <div class="preset-panel">
            <div class="preset-title">Ready Rules</div>
            <div id="rulePresetButtons" class="rule-presets"></div>
          </div>
          <div class="preset-panel">
            <div class="preset-title">Saved Custom Rules</div>
            <div id="customRuleButtons" class="rule-presets"></div>
          </div>
          <div class="detection-toolbar">
            <label class="checkbox-label">
              <input type="checkbox" id="includeFalsePositives" />
              <span>Include false positives</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="exportDetectionsCsv" />
              <span>Export CSV after run</span>
            </label>
            <div class="action-buttons">
              <button type="button" id="refreshDetectionsButton" class="secondary">
                Refresh detections
              </button>
              <button type="button" id="runDetectionsButton">Run detections</button>
            </div>
          </div>
          <div class="status detection-status" id="detectionsStatus"></div>
          <div class="detections-list" id="detectionsBox"></div>
          <div class="pagination">
            <button id="detectionsPrevButton" disabled>Previous</button>
            <span class="page-info" id="detectionsPageInfo">Detections page 1</span>
            <button id="detectionsNextButton" disabled>Next</button>
          </div>
        </div>
      </div>
    </div>

    <script src="detection.js?v=7"></script>
  </body>
</html>
