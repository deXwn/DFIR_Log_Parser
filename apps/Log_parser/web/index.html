<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DFIR Log Search</title>
    <!-- Bootstrap Grid (grid only) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-grid.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css?v=4" />
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <h1>DFIR Log Search</h1>
        <div class="topbar-links">
          <a class="btn secondary" href="/detection">Detection</a>
          <div class="pill">Rust-powered log analysis</div>
        </div>
      </div>
      <div id="modal" class="modal hidden">
        <div class="modal-content">
          <button id="closeModal" class="close-btn">×</button>
          <div id="modalBody"></div>
        </div>
      </div>

      <form id="search-form">
        <div class="row">
          <div class="col-12">
            <label>
              Root path
              <input type="text" id="rootPath" placeholder="/path/to/logs" autocomplete="off" required />
            </label>
          </div>
          <div class="col-md-6">
            <label>
              Keywords (comma separated)
              <input type="text" id="keywords" placeholder="error, failed, denied" />
            </label>
          </div>
          <div class="col-md-6">
            <label>
              Exclude keywords (comma separated)
              <input type="text" id="noneKeywords" placeholder="debug, info" />
            </label>
          </div>
          <div class="col-md-3 col-6">
            <label>
              Match mode
              <select id="matchMode">
                <option value="any">Any (OR)</option>
                <option value="all">All (AND)</option>
              </select>
            </label>
          </div>
          <div class="col-md-3 col-6">
            <label>
              Page size
              <select id="pageSize">
                <option value="50">50</option>
                <option value="100" selected>100</option>
                <option value="200">200</option>
                <option value="500">500</option>
              </select>
            </label>
          </div>
          <div class="col-md-3 col-6">
            <label>
              HTTP status code
              <select id="statusCode">
                <option value="">Any</option>
                <option value="200">200</option>
                <option value="301">301</option>
                <option value="302">302</option>
                <option value="404">404</option>
                <option value="500">500</option>
              </select>
            </label>
          </div>
          <div class="col-md-3 col-6">
            <label>
              IP scope
              <select id="ipScope">
                <option value="">Any</option>
                <option value="private">Private only</option>
                <option value="public">Public only</option>
              </select>
            </label>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <label>
              Min bytes_received
              <input type="number" id="minBytesReceived" min="0" step="1" placeholder="e.g. 10000" />
            </label>
          </div>
          <div class="col-md-6">
            <label>
              Sort by
              <select id="sortMode">
                <option value="file_position">File & line (default)</option>
                <option value="bytes_received_desc">bytes_received ↓ (high to low)</option>
                <option value="bytes_received_asc">bytes_received ↑ (low to high)</option>
              </select>
            </label>
          </div>
        </div>
        <div class="controls">
          <div class="switches">
            <label class="checkbox-label">
              <input type="checkbox" id="caseSensitive" />
              <span>Case sensitive</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="exportCsv" />
              <span>Export all to CSV</span>
            </label>
          </div>
          <div class="action-buttons">
            <button type="submit" id="searchButton">Search</button>
            <button type="button" id="ipSummaryButton" class="secondary">IP summary</button>
          </div>
          <span class="loading" id="loading" hidden>Searching…</span>
        </div>
        <div class="status" id="status"></div>
      </form>

      <div class="summary" id="summary">
        Enter a root path and keywords, then press Search.
      </div>

      <div class="ip-summary" id="ipSummaryBox">
        No IP summary yet. Run a search, then click "IP summary".
      </div>

      <div class="inspection" id="inspection">
        No log line selected yet.
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width: 110px">Actions</th>
              <th style="width: 110px">Line</th>
              <th>Log line</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <tr>
              <td colspan="3">No results yet.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button id="prevButton" disabled>Previous</button>
        <span class="page-info" id="pageInfo">Page 1</span>
        <button id="nextButton" disabled>Next</button>
      </div>
    </div>

    <!-- Custom JS -->
    <script src="script.js?v=7"></script>
  </body>
</html>
